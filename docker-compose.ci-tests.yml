name: shadow-ci-tests

services:
  postgres:
    extends:
      file: ./docker-compose.yml
      service: postgres
    ports: []
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U shadow" ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 60s

  redis:
    extends:
      file: ./docker-compose.yml
      service: redis
    ports: []

  minio:
    extends:
      file: ./docker-compose.yml
      service: minio
    ports: []
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  ci-tests:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    working_dir: /workspace
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://shadow:shadow@postgres:5432/shadow
      REDIS_URL: redis://redis:6379
      SHADOW_DISABLE_RATE_LIMITS: ${SHADOW_DISABLE_RATE_LIMITS:-false}
      SHADOW_DIY_CLOUD_DAILY_LIMIT: ${SHADOW_DIY_CLOUD_DAILY_LIMIT:-24}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: false
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: shadow
      # CI test secret — never used in production
      JWT_SECRET: ci-test-secret-do-not-use-in-prod
      OAUTH_BASE_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
      ADMIN_EMAIL: admin@shadowob.app
      ADMIN_PASSWORD: admin123456
      ADMIN_USERNAME: admin
      NODE_ENV: test
    command: >-
      bash -lc '
        set -euo pipefail

        echo "=== Lint ==="
        pnpm exec biome lint . --diagnostic-level=error

        echo "=== Version consistency ==="
        pnpm check:sdk-versions

        echo "=== Workspace dependency check ==="
        node scripts/check-workspace-deps.mjs

        echo "=== Pre-push checks ==="
        node scripts/pre-push-checks.mjs

        echo "=== Build shared packages ==="
        pnpm build:packages

        echo "=== Typecheck (packages - strict) ==="
        pnpm --filter "./packages/*" --workspace-concurrency=2 typecheck

        echo "=== Typecheck (apps - report only) ==="
        pnpm --filter "./apps/*" --workspace-concurrency=2 typecheck || echo "⚠ App typecheck errors exist — non-blocking for now"

        echo "=== Database migration ==="
        pnpm --filter @shadowob/server db:migrate

        echo "=== Package tests ==="
        pnpm -r --filter "@shadowob/*" --workspace-concurrency=2 exec vitest run --passWithNoTests

        echo "=== Root tests ==="
        pnpm exec vitest run --passWithNoTests
      '

volumes:
  pg_data:
  redis_data:
  minio_data:
