<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Design System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-base: #070708;
      --bg-elevated: #0F0F10;
      --bg-surface: #151516;
      --bg-overlay: #1C1C1D;
      
      --text-primary: #FAFAFA;
      --text-secondary: #A1A1AA;
      --text-tertiary: #71717A;
      
      --brand: #6366F1;
      --brand-light: #818CF8;
      --brand-subtle: rgba(99, 102, 241, 0.12);
      
      --border: rgba(255, 255, 255, 0.06);
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }
    
    .page { max-width: 1100px; margin: 0 auto; padding: 0 40px; }
    
    /* Hero */
    .hero { padding: 100px 0 80px; text-align: center; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 14px; background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: 999px;
      font-size: 13px; color: var(--text-secondary); margin-bottom: 32px;
    }
    .hero-badge i { color: var(--brand); width: 14px; height: 14px; }
    .hero-title { font-size: 56px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 16px; }
    .hero-title span { color: var(--text-tertiary); }
    .hero-subtitle { font-size: 18px; color: var(--text-secondary); margin-bottom: 32px; }
    
    /* Section */
    .section { padding: 64px 0; border-top: 1px solid var(--border); }
    .section-title { font-size: 24px; font-weight: 600; margin-bottom: 40px; }
    
    /* Colors */
    .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .color-item { text-align: center; }
    .color-swatch { aspect-ratio: 1; border-radius: 12px; margin-bottom: 12px; }
    .color-name { font-size: 13px; font-weight: 500; }
    .color-hex { font-family: monospace; font-size: 11px; color: var(--text-tertiary); }
    
    /* Typography */
    .type-row { display: grid; grid-template-columns: 140px 1fr; gap: 32px; padding: 20px 0; border-bottom: 1px solid var(--border); align-items: center; }
    .type-row:last-child { border-bottom: none; }
    .type-label { font-size: 13px; font-weight: 600; }
    .type-spec { font-family: monospace; font-size: 12px; color: var(--text-tertiary); }
    .type-h1 { font-size: 32px; font-weight: 600; letter-spacing: -0.02em; }
    .type-h2 { font-size: 26px; font-weight: 600; letter-spacing: -0.015em; }
    .type-h3 { font-size: 20px; font-weight: 600; }
    .type-body { font-size: 16px; color: var(--text-secondary); }
    .type-small { font-size: 14px; color: var(--text-tertiary); }
    
    /* Components */
    .comp-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
    .comp-card { background: var(--bg-elevated); border-radius: 16px; padding: 24px; border: 1px solid var(--border); }
    .comp-label { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 20px; }
    .comp-label i { width: 14px; height: 14px; }
    .comp-row { display: flex; gap: 12px; margin-bottom: 12px; }
    
    /* Buttons */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; font-weight: 500; border: none; cursor: pointer; transition: all 0.15s; height: 40px; padding: 0 20px; border-radius: 10px; }
    .btn i { width: 16px; height: 16px; }
    .btn-primary { background: var(--brand); color: white; }
    .btn-primary:hover { background: var(--brand-light); }
    .btn-secondary { background: var(--bg-surface); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--bg-overlay); }
    .btn-ghost { background: transparent; color: var(--text-secondary); }
    .btn-ghost:hover { color: var(--text-primary); background: var(--bg-surface); }
