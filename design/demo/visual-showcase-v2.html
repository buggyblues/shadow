<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Design System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      /* Refined Color System - Indigo accent on dark gray */
      --bg-primary: #0C0C0F;
      --bg-secondary: #141418;
      --bg-tertiary: #1C1C21;
      --bg-elevated: #242429;
      
      --text-primary: #F2F2F5;
      --text-secondary: #9CA3AF;
      --text-muted: #6B7280;
      
      --accent: #6366F1;
      --accent-hover: #818CF8;
      --accent-subtle: rgba(99, 102, 241, 0.15);
      
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-default: rgba(255, 255, 255, 0.1);
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    
    .container { max-width: 1000px; margin: 0 auto; padding: 0 48px; }
    .section { padding: 80px 0; border-bottom: 1px solid var(--border-subtle); }
    .section:last-child { border-bottom: none; }
    
    /* Header */
    .header { text-align: center; padding: 100px 0 60px; }
    .header-logo { 
      width: 56px; height: 56px; background: var(--accent); border-radius: 14px;
      margin: 0 auto 24px; display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 700; color: white;
    }
    .header h1 { font-size: 40px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 12px; }
    .header p { font-size: 17px; color: var(--text-secondary); }
    
    /* Section titles */
    .sec-title { font-size: 13px; font-weight: 500; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .sec-heading { font-size: 26px; font-weight: 600; margin-bottom: 40px; }
    
    /* Colors */
    .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
    .color-item { text-align: center; }
    .color-swatch { height: 80px; border-radius: 12px; margin-bottom: 12px; }
    .color-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
    .color-hex { font-family: monospace; font-size: 12px; color: var(--text-muted); }
    
    /* Typography */
    .type-item { display: flex; align-items: baseline; gap: 40px; padding: 24px 0; border-bottom: 1px solid var(--border-subtle); }
    .type-item:last-child { border-bottom: none; }
    .type-spec { width: 80px; font-size: 12px; color: var(--text-muted); font-family: monospace; }
    .type-h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.3px; }
    .type-h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.2px; }
    .type-h3 { font-size: 17px; font-weight: 600; }
    .type-body { font-size: 15px; color: var(--text-secondary); }
    .type-small { font-size: 13px; color: var(--text-muted); }
    
    /* Components */
    .comp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    .comp-box { background: var(--bg-secondary); border-radius: 14px; padding: 28px; border: 1px solid var(--border-subtle); }
    .comp-label { font-size: 12px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 20px; }
    .comp-row { display: flex; gap: 12px; margin-bottom: 12px; }
    .comp-row:last-child { margin-bottom: 0; }
    
    /* Buttons */
    .btn { display: inline-flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; border: none; cursor: pointer; transition: all 0.15s; height: 40px; padding: 0 20px; border-radius: 10px; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-default); }
    .btn-secondary:hover { background: var(--bg-elevated); }
    .btn-ghost { background: transparent; color: var(--text-secondary); }
    .btn-ghost:hover { color: var(--text-primary); background: var(--bg-tertiary); }
    
    /* Inputs */
    .input { width: 100%; height: 44px; padding: 0 16px; background: var(--bg-tertiary); border: 1px solid var(--border-default); border-radius: 10px; color: var(--text-primary); font-size: 14px; outline: none; transition: all 0.15s; }
    .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-subtle); }
    .input::placeholder { color: var(--text-muted); }
    
    /* Cards */
    .card { background: var(--bg-tertiary); border-radius: 14px; padding: 24px; }
    .card-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .card-text { font-size: 14px; color: var(--text-secondary); }
    
    /* Avatar */
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #8B5CF6); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: white; }
    
    /* Badge */
    .badge { display: inline-flex; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; }
    .badge-accent { background: var(--accent-subtle); color: var(--accent); }
    .badge-default { background: var(--bg-tertiary); color: var(--text-secondary); }
    
    /* UI Preview */
    .ui-preview { background: var(--bg-secondary); border-radius: 16px; padding: 24px; border: 1px solid var(--border-subtle); }
    .ui-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border-subtle); }
    .ui-title { font-size: 15px; font-weight: 600; }
    .ui-content { display: flex; gap: 16px; }
    .ui-sidebar { width: 56px; display: flex; flex-direction: column; gap: 8px; }
    .ui-server { width: 44px; height: 44px; border-radius: 12px; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
    .ui-server:hover, .ui-server.active { background: var(--accent); color: white; border-radius: 12px; }
    .ui-main { flex: 1; background: var(--bg-primary); border-radius: 12px; padding: 20px; min-height: 200px; }
    .ui-message { display: flex; gap: 12px; margin-bottom: 16px; }
    .ui-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #8B5CF6); }
    .ui-bubble { background: var(--bg-tertiary); padding: 10px 14px; border-radius: 12px; max-width: 300px; }
    .ui-name { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 2px; }
    .ui-text { font-size: 14px; color: var(--text-secondary); }
    .ui-input-row { display: flex; gap: 12px; margin-top: 20px; }
    .ui-input { flex: 1; }
  </style>
</head>
<body>

<div class="header">
  <div class="container">
    <div class="header-logo">S</div>
    <h1>Shadow Design System</h1>
    <p>Refined, minimal, focused</p>
  </div>
</div>

<div class="container">
  
  <!-- Colors -->
  <div class="section">
    <div class="sec-title">Foundation</div>
    <div class="sec-heading">Color Palette</div>
    
    <div class="color-grid">
      <div class="color-item">
        <div class="color-swatch" style="background: #0C0C0F;"></div>
        <div class="color-name">Background</div>
        <div class="color-hex">#0C0C0F</div>
      </div>
      <div class="color-item">
        <div class="color-swatch" style="background: #141418;"></div>
        <div class="color-name">Surface</div>
        <div class="color-hex">#141418</div>
      </div>
      <div class="color-item
