version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - patch
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - ci
    commit-message:
      prefix: "ci(deps)"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    labels:
      - ci
    commit-message:
      prefix: "ci(docker)"

  - package-ecosystem: pip
    directory: /packages/sdk-python
    schedule:
      interval: monthly
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
