name: build-validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-packages:
    name: Build packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Free disk space for Docker build
        shell: bash
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate runner Dockerfiles
        shell: bash
        run: |
          set -euo pipefail
          for dockerfile in \
            apps/cloud/images/claude-runner/Dockerfile \
            apps/cloud/images/codex-runner/Dockerfile \
            apps/cloud/images/openclaw-runner/Dockerfile \
            apps/cloud/images/opencode-runner/Dockerfile \
            apps/cloud/images/hermes-runner/Dockerfile; do
            docker buildx build --check --progress=plain --file "$dockerfile" .
          done

      - name: Run build check in container
        run: |
          docker compose -f docker-compose.ci-build.yml up --build --abort-on-container-exit --exit-code-from build-check build-check

      - name: Cleanup Docker
        if: always()
        run: docker compose -f docker-compose.ci-build.yml down -v --remove-orphans
