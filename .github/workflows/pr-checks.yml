name: pr-checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changed-files:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      web: ${{ steps.filter.outputs.web }}
      admin: ${{ steps.filter.outputs.admin }}
      desktop: ${{ steps.filter.outputs.desktop }}
      mobile: ${{ steps.filter.outputs.mobile }}
      packages: ${{ steps.filter.outputs.packages }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Path filter
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            server:
              - 'apps/server/**'
              - 'packages/shared/**'
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
              - 'packages/ui/**'
            admin:
              - 'apps/admin/**'
              - 'packages/shared/**'
              - 'packages/ui/**'
            desktop:
              - 'apps/desktop/**'
              - 'packages/shared/**'
              - 'packages/openclaw-shadowob/**'
            mobile:
              - 'apps/mobile/**'
              - 'packages/shared/**'
              - 'packages/ui/**'
            packages:
              - 'packages/**'
            ci:
              - '.github/**'
              - 'docker-compose*.yml'
              - 'Dockerfile*'
              - 'scripts/**'

  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    needs: changed-files
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: i18n check
        run: pnpm check:i18n

      - name: Build shared packages (for typecheck)
        run: pnpm build:packages

      - name: Typecheck packages (strict)
        run: pnpm --filter "./packages/*" --parallel typecheck

      - name: Typecheck apps (report only)
        continue-on-error: true
        run: pnpm --filter "./apps/*" --parallel typecheck

  tests:
    name: Unit/Integration tests
    runs-on: ubuntu-latest
    needs: changed-files
    env:
      JWT_SECRET: ci-test-secret-do-not-use-in-prod
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run unit/integration tests in docker-compose
        shell: bash
        run: |
          docker compose -f docker-compose.ci-tests.yml up --build --abort-on-container-exit --exit-code-from ci-tests ci-tests

      - name: Cleanup Docker
        if: always()
        run: docker compose -f docker-compose.ci-tests.yml down -v --remove-orphans

  e2e:
    name: E2E via docker-compose
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-test-secret-do-not-use-in-prod
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run E2E stack
        shell: bash
        env:
          JWT_SECRET: e2e-test-secret-not-for-production
          ADMIN_EMAIL: admin@shadowob.app
          ADMIN_PASSWORD: admin123456
        run: |
          docker compose -f docker-compose.e2e.yml up --build --abort-on-container-exit --exit-code-from e2e-runner e2e-runner

      - name: Upload E2E screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-screenshots
          path: docs/e2e/screenshots
          if-no-files-found: warn

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-playwright-report
          path: |
            apps/desktop/playwright-report-web
            apps/desktop/test-results
          if-no-files-found: warn

      - name: Cleanup Docker
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v --remove-orphans

  report:
    name: PR report comment
    needs: [changed-files, lint-and-typecheck, tests, e2e]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download screenshots artifact
        if: needs.e2e.result != 'skipped'
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: e2e-screenshots
          path: e2e-screenshots

      - name: Build comment body
        id: comment
        shell: bash
        run: |
          {
            echo "## CI 检查结果"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Lint & Typecheck | **${{ needs.lint-and-typecheck.result }}** |"
            echo "| Tests | **${{ needs.tests.result }}** |"
            echo "| E2E | **${{ needs.e2e.result }}** |"
            echo ""
            echo "### 变更范围"
            echo ""
            CHANGES=""
            [[ "${{ needs.changed-files.outputs.server }}" == "true" ]] && CHANGES="${CHANGES} \`server\`"
            [[ "${{ needs.changed-files.outputs.web }}" == "true" ]] && CHANGES="${CHANGES} \`web\`"
            [[ "${{ needs.changed-files.outputs.admin }}" == "true" ]] && CHANGES="${CHANGES} \`admin\`"
            [[ "${{ needs.changed-files.outputs.desktop }}" == "true" ]] && CHANGES="${CHANGES} \`desktop\`"
            [[ "${{ needs.changed-files.outputs.mobile }}" == "true" ]] && CHANGES="${CHANGES} \`mobile\`"
            [[ "${{ needs.changed-files.outputs.packages }}" == "true" ]] && CHANGES="${CHANGES} \`packages\`"
            [[ "${{ needs.changed-files.outputs.ci }}" == "true" ]] && CHANGES="${CHANGES} \`ci\`"
            echo "Affected: ${CHANGES:-none}"
            echo ""
            echo "🔎 详情与产物："
            echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "### E2E 截图清单"
            if [ -d e2e-screenshots ]; then
              find e2e-screenshots -type f \( -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' \) | sort | sed 's#^#- #' || true
            else
              echo "- (无截图产物)"
            fi
            echo ""
            echo "> 注：截图文件已作为 workflow artifact 上传，可在本次 run 页面直接下载查看。"
          } > pr-comment.md

      - name: Upsert PR comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-checks-report
          recreate: true
          path: pr-comment.md
