name: deploy-integrations-production

on:
  workflow_run:
    workflows: [publish-integration-images]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag for shadow-integrations, shadow-integration-flash, and shadow-integration-space.
        required: false
        default: latest

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-integrations-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production integrations
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'workflow_run')
    runs-on: ubuntu-latest
    environment: ShadowOB Production
    steps:
      - name: Download published image metadata
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v8
        with:
          name: integration-image-metadata
          path: .tmp/integration-image-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve deploy tag
        id: deploy
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA_FALLBACK: ${{ github.sha }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag || '' }}
        run: |
          set -euo pipefail

          read_metadata_value() {
            local key="$1"
            local file="$2"

            awk -F= -v key="$key" '
              $1 == key {
                sub(/^[^=]*=/, "")
                print
                found = 1
                exit
              }
              END {
                if (found != 1) {
                  exit 1
                }
              }
            ' "$file"
          }

          if [ "$EVENT_NAME" = "workflow_run" ]; then
            metadata_file=".tmp/integration-image-metadata/image.env"
            if [ ! -f "$metadata_file" ]; then
              printf 'Missing integration image metadata artifact: %s\n' "$metadata_file" >&2
              exit 1
            fi

            image_tag="$(read_metadata_value image_tag "$metadata_file")"
            source_sha="$(read_metadata_value source_sha "$metadata_file")"
          else
            image_tag="${INPUT_IMAGE_TAG:-latest}"
            source_sha="$GITHUB_SHA_FALLBACK"
          fi

          if [[ ! "$image_tag" =~ ^[A-Za-z0-9_.-]+$ ]]; then
            printf 'Invalid image tag: %s\n' "$image_tag" >&2
            exit 1
          fi

          if [[ ! "$source_sha" =~ ^[0-9a-f]{40}$ ]]; then
            printf 'Invalid source sha: %s\n' "$source_sha" >&2
            exit 1
          fi

          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${source_sha}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.deploy.outputs.source_sha }}

      - name: Guard production deploy
        shell: bash
        run: bash scripts/ops/verify-prod-no-build.sh

      - name: Prepare SSH auth
        shell: bash
        env:
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
          PROD_SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          install -m 700 -d "$HOME/.ssh"

          if [ -n "$PROD_SSH_PRIVATE_KEY" ]; then
            key_path="$HOME/.ssh/prod_deploy_key"
            printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > "$key_path"
            chmod 600 "$key_path"
            echo "PROD_SSH_KEY_PATH=${key_path}" >> "$GITHUB_ENV"
          elif [ -n "$PROD_SSH_PASSWORD" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq sshpass
          fi

          if [ -n "$PROD_SSH_KNOWN_HOSTS" ]; then
            printf '%s\n' "$PROD_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
            chmod 600 "$HOME/.ssh/known_hosts"
          fi

      - name: Deploy integrations over SSH
        shell: bash
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST || '' }}
          PROD_SSH_USER: ${{ vars.PROD_SSH_USER || 'root' }}
          PROD_SSH_PORT: ${{ vars.PROD_SSH_PORT || '22' }}
          PROD_REMOTE_PATH: ${{ vars.PROD_REMOTE_PATH || '/workspace/shadow' }}
          PROD_IMAGE_REGISTRY: ${{ vars.PROD_IMAGE_REGISTRY || 'ghcr.io' }}
          PROD_IMAGE_NAMESPACE: ${{ vars.PROD_IMAGE_NAMESPACE || '' }}
          IMAGE_TAG: ${{ steps.deploy.outputs.image_tag }}
          SSHPASS: ${{ secrets.PROD_SSH_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -n "$PROD_SSH_HOST" ]; then
            echo "::add-mask::$PROD_SSH_HOST"
          fi

          image_namespace="${PROD_IMAGE_NAMESPACE:-${GITHUB_REPOSITORY_OWNER,,}}"

          args=(
            --host "$PROD_SSH_HOST"
            --user "$PROD_SSH_USER"
            --port "$PROD_SSH_PORT"
            --remote-path "$PROD_REMOTE_PATH"
            --image-registry "$PROD_IMAGE_REGISTRY"
            --image-namespace "$image_namespace"
            --image-tag "$IMAGE_TAG"
          )

          scripts/ops/deploy-integrations-prod.sh "${args[@]}"
