name: security-audit

on:
  schedule:
    - cron: '0 6 * * 1'    # Every Monday at 06:00 UTC
  pull_request:
    paths:
      - 'pnpm-lock.yaml'
      - '**/package.json'
      - 'packages/sdk-python/pyproject.toml'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-audit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep custom security rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: .semgrep.yml

  npm-audit:
    name: npm dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Run production dependency audit
        run: pnpm check:audit

  docker-scan:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint Dockerfiles with hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile.e2e
          failure-threshold: warning

      - name: Lint server Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: apps/server/Dockerfile
          failure-threshold: warning

      - name: Lint web Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: apps/web/Dockerfile
          failure-threshold: warning

      - name: Lint admin Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: apps/admin/Dockerfile
          failure-threshold: warning
