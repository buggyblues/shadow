name: release-desktop-beta

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Publish even if there are no new desktop beta changes'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: desktop-beta-release
  cancel-in-progress: false

jobs:
  gate:
    name: Detect releasable desktop beta changes
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.gate.outputs.should_release }}
      base: ${{ steps.gate.outputs.base }}
      head_sha: ${{ steps.gate.outputs.head_sha }}
      changed_files: ${{ steps.gate.outputs.changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Decide whether to publish beta
        id: gate
        shell: bash
        env:
          FORCE: ${{ inputs.force || 'false' }}
        run: |
          set -euo pipefail
          git fetch --force --tags

          force="${FORCE:-false}"
          head_sha="$(git rev-parse HEAD)"
          base="$(git tag --list 'desktop-beta-v*' --sort=-creatordate | head -n 1 || true)"

          if [ -n "$base" ]; then
            range="${base}..HEAD"
          elif git rev-parse -q --verify HEAD^ >/dev/null; then
            range="HEAD^..HEAD"
          else
            range="HEAD"
          fi

          changed="$(
            git diff --name-only "$range" -- \
              .github/workflows/release-desktop-artifacts.yml \
              .github/workflows/release-desktop-beta.yml \
              .github/actions/setup-wix \
              apps/desktop \
              apps/server/src/handlers/desktop-release.handler.ts \
              packages/connector \
              packages/openclaw-shadowob \
              packages/sdk \
              packages/shared \
              packages/ui \
              package.json \
              pnpm-lock.yaml \
              pnpm-workspace.yaml \
              scripts/prepare-app-release-version.mjs \
            | sed '/^$/d'
          )"

          if [ -z "$changed" ] && [ "$force" != "true" ]; then
            should_release=false
            echo "No desktop beta relevant changes since ${base:-previous commit}."
          else
            should_release=true
          fi

          {
            echo "should_release=${should_release}"
            echo "base=${base}"
            echo "head_sha=${head_sha}"
            echo "changed_files<<EOF"
            echo "$changed"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  prepare-release-version:
    name: Prepare beta desktop release version
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.should_release == 'true'
    concurrency:
      group: app-release-version-${{ needs.gate.outputs.head_sha }}
      cancel-in-progress: false
    outputs:
      version: ${{ steps.version.outputs.version }}
      desktop_beta_tag: ${{ steps.version.outputs.desktop_beta_tag }}
      desktop_version_tag: ${{ steps.version.outputs.desktop_version_tag }}
      release_sha: ${{ steps.commit.outputs.release_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare version commit
        id: version
        shell: bash
        env:
          FORCE: ${{ inputs.force || 'false' }}
          RELEASE_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git fetch origin "+refs/heads/${RELEASE_BRANCH}:refs/remotes/origin/${RELEASE_BRANCH}" --tags
          git checkout -B "${RELEASE_BRANCH}" "origin/${RELEASE_BRANCH}"
          node scripts/prepare-app-release-version.mjs \
            --target=desktop \
            --source-sha="${{ needs.gate.outputs.head_sha }}" \
            --force="${FORCE}"

      - name: Commit version bump
        id: commit
        shell: bash
        env:
          RELEASE_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/package.json
          if git diff --cached --quiet; then
            echo "Beta desktop version already prepared."
          else
            git commit \
              -m "chore(release): desktop v${{ steps.version.outputs.version }}" \
              -m "Release-Source-SHA: ${{ needs.gate.outputs.head_sha }}" \
              -m "Release-Target: desktop"
            git push origin "HEAD:${RELEASE_BRANCH}"
          fi
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  publish-release:
    name: Build and publish desktop beta
    needs: [gate, prepare-release-version]
    if: needs.gate.outputs.should_release == 'true'
    uses: ./.github/workflows/release-desktop-artifacts.yml
    with:
      release_sha: ${{ needs.prepare-release-version.outputs.release_sha }}
      source_sha: ${{ needs.gate.outputs.head_sha }}
      version: ${{ needs.prepare-release-version.outputs.version }}
      release_tag: ${{ needs.prepare-release-version.outputs.desktop_beta_tag }}
      desktop_version_tag: ${{ needs.prepare-release-version.outputs.desktop_version_tag }}
      release_name: Shadow Desktop Beta v${{ needs.prepare-release-version.outputs.version }}
      channel: beta
      prerelease: true
      base: ${{ needs.gate.outputs.base }}
      changed_files: ${{ needs.gate.outputs.changed_files }}
    secrets: inherit
