name: publish-integration-images

on:
  workflow_run:
    workflows: [publish-integrations-runtime]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      image:
        description: Integration image to publish
        required: true
        default: all
        type: choice
        options:
          - all
          - flash
          - space
      tag:
        description: Optional extra image tag to publish
        required: false
        default: ''

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-integration-images-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and push ${{ matrix.name }} integration image
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: flash
            image: shadow-integration-flash
            dockerfile: integrations/flash/Dockerfile
            cache_scope: shadow-integration-flash
          - name: space
            image: shadow-integration-space
            dockerfile: integrations/space/Dockerfile
            cache_scope: shadow-integration-space
    steps:
      - name: Checkout
        if: github.event_name == 'workflow_run' || inputs.image == 'all' || inputs.image == matrix.name
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Pre-pull BuildKit image
        if: github.event_name == 'workflow_run' || inputs.image == 'all' || inputs.image == matrix.name
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if docker pull moby/buildkit:buildx-stable-1; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              echo "Failed to pull BuildKit image after ${attempt} attempts."
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Set up Docker Buildx
        if: github.event_name == 'workflow_run' || inputs.image == 'all' || inputs.image == matrix.name
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'workflow_run' || inputs.image == 'all' || inputs.image == matrix.name
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        if: github.event_name == 'workflow_run' || inputs.image == 'all' || inputs.image == matrix.name
        id: image
        shell: bash
        env:
          EXTRA_TAG: ${{ inputs.tag || '' }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          IMAGE_NAME: ${{ matrix.image }}
        run: |
          set -euo pipefail
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          image="${REGISTRY}/${owner}/${IMAGE_NAME}"
          short_sha="$(printf '%s' "$HEAD_SHA" | cut -c1-12)"
          branch_tag="$(printf '%s' "$HEAD_BRANCH" | tr '/[:upper:]' '-[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+|-+$//g')"

          {
            echo "ref=${image}:sha-${short_sha}"
            echo "tags<<EOF"
            echo "${image}:sha-${short_sha}"
            if [ -n "$branch_tag" ]; then
              echo "${image}:${branch_tag}"
            fi
            if [ "$HEAD_BRANCH" = "main" ]; then
              echo "${image}:latest"
            fi
            if [ -n "$EXTRA_TAG" ]; then
              echo "${image}:${EXTRA_TAG}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        if: github.event_name == 'workflow_run' || inputs.image == 'all' || inputs.image == matrix.name
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=min,scope=${{ matrix.cache_scope }},ignore-error=true

      - name: Print image
        if: github.event_name == 'workflow_run' || inputs.image == 'all' || inputs.image == matrix.name
        run: echo "Published ${{ steps.image.outputs.ref }}"

  publish-metadata:
    name: Publish integration image metadata
    needs: build-and-push
    if: github.event_name == 'workflow_run' && needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Write image metadata
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail

          short_sha="$(printf '%s' "$HEAD_SHA" | cut -c1-12)"
          metadata_dir="${RUNNER_TEMP}/integration-image-metadata"
          mkdir -p "$metadata_dir"

          {
            echo "source_sha=${HEAD_SHA}"
            echo "source_branch=${HEAD_BRANCH}"
            echo "image_tag=sha-${short_sha}"
          } > "${metadata_dir}/image.env"

      - name: Upload image metadata
        uses: actions/upload-artifact@v7
        with:
          name: integration-image-metadata
          path: ${{ runner.temp }}/integration-image-metadata/image.env
          if-no-files-found: error
          retention-days: 14
