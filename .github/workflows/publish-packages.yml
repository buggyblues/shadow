name: publish-packages

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      publish_npm:
        description: Publish @shadowob/sdk to npm
        type: boolean
        default: true
      publish_pypi:
        description: Publish shadowob-sdk to PyPI
        type: boolean
        default: true
      create_release:
        description: Create GitHub Release after publishing
        type: boolean
        default: true
      dry_run:
        description: Dry run only (skip publish / tag / release)
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: publish-sdk
  cancel-in-progress: false

jobs:
  release-sdk:
    name: Publish SDK packages
    runs-on: ubuntu-latest
    environment: ShadowOB SDK

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Setup Python
        uses: actions/setup-python@v5
        if: inputs.publish_pypi
        with:
          python-version: "3.12"

      - name: Normalize GitHub git URLs to HTTPS
        shell: bash
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/

      - name: Install SDK workspace dependencies
        run: |
          pnpm install --frozen-lockfile \
            --filter @shadowob/sdk... \
            --filter @shadowob/shared...

      - name: Verify SDK versions before bump
        run: pnpm check:sdk-versions

      - name: Compute new version
        id: version
        shell: bash
        run: |
          CURRENT=$(node -p "require('./packages/sdk/package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "SDK_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"
          echo "Release version: $NEW_VERSION"

      - name: Bump SDK versions
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Bump npm package version - use cd instead of pnpm flags
          (cd packages/sdk && pnpm version "$VERSION" --no-git-tag-version)
          
          # Bump Python package version using sed
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" packages/sdk-python/pyproject.toml

          pnpm check:sdk-versions

      - name: Build Python distribution
        if: inputs.publish_pypi
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --sdist packages/sdk-python

      - name: Publish @shadowob/sdk to npm
        if: inputs.publish_npm && !inputs.dry_run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          (cd packages/sdk && pnpm publish --no-git-checks --access public)

      - name: Publish shadowob-sdk to PyPI
        if: inputs.publish_pypi && !inputs.dry_run
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          python -m twine upload packages/sdk-python/dist/*

      - name: Dry run summary
        if: inputs.dry_run
        run: |
          echo "dry_run=true, publish/tag/release steps were skipped."
          echo "built SDK artifacts and verified version consistency only."

      - name: Commit and tag release
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/sdk/package.json packages/sdk-python/pyproject.toml
          git commit -m "chore(release): sdk v${VERSION}"
          git tag "sdk-v${VERSION}"
          git push
          git push --tags

      - name: Create GitHub Release
        if: inputs.create_release && !inputs.dry_run
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sdk-v${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            SDK release version: `${{ steps.version.outputs.version }}`

            Published packages:
            - npm: `@shadowob/sdk@${{ steps.version.outputs.version }}`
            - PyPI: `shadowob-sdk==${{ steps.version.outputs.version }}`
