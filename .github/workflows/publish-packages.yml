name: publish-packages

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      publish_npm:
        description: Publish all public npm packages under packages/
        type: boolean
        default: true
      publish_pypi:
        description: Publish shadowob-sdk to PyPI
        type: boolean
        default: true
      create_release:
        description: Create GitHub Release after publishing
        type: boolean
        default: true
      dry_run:
        description: Dry run only (skip publish / tag / release)
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: publish-sdk
  cancel-in-progress: false

jobs:
  release-sdk:
    name: Publish SDK packages
    runs-on: ubuntu-latest
    environment: ShadowOB SDK

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Setup Python
        uses: actions/setup-python@v5
        if: inputs.publish_pypi
        with:
          python-version: "3.12"

      - name: Normalize GitHub git URLs to HTTPS
        shell: bash
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/

      - name: Install SDK workspace dependencies
        run: |
          pnpm install --frozen-lockfile \
            --filter ./packages/*...

      - name: Compute publishable npm workspace filters
        id: publish_targets
        shell: bash
        run: |
          FILTERS=$(node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')

          const packagesDir = path.resolve(process.cwd(), 'packages')
          const dirs = fs.readdirSync(packagesDir).filter((d) => {
            const full = path.join(packagesDir, d)
            return fs.statSync(full).isDirectory()
          })

          const filters = []
          for (const dir of dirs) {
            const pkgJsonPath = path.join(packagesDir, dir, 'package.json')
            if (!fs.existsSync(pkgJsonPath)) continue
            const pkg = JSON.parse(fs.readFileSync(pkgJsonPath, 'utf8'))
            if (pkg.private) continue
            filters.push(`--filter ${JSON.stringify(`./packages/${dir}`)}`)
          }

          process.stdout.write(filters.join(' '))
          NODE
          )

          if [ -z "$FILTERS" ]; then
            echo "No publishable npm packages found under packages/."
            exit 1
          fi

          echo "npm_filters=$FILTERS" >> "$GITHUB_OUTPUT"
          echo "NPM_FILTERS=$FILTERS" >> "$GITHUB_ENV"
          echo "Publish filters: $FILTERS"

      - name: Verify workspace dependencies before bump
        run: pnpm check:workspace-deps

      - name: Compute current SDK version
        id: version_before
        shell: bash
        run: |
          CURRENT=$(node -p "require('./packages/sdk/package.json').version")
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "SDK_VERSION_BEFORE=$CURRENT" >> "$GITHUB_ENV"
          echo "Current SDK version: $CURRENT"

      - name: Bump all public npm package versions
        shell: bash
        run: |
          pnpm -r ${NPM_FILTERS} version "${{ inputs.bump }}" --no-git-tag-version

      - name: Sync sdk-python version with npm SDK
        shell: bash
        run: |
          SDK_VERSION=$(node -p "require('./packages/sdk/package.json').version")
          echo "SDK_VERSION=$SDK_VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version = \".*\"/version = \"${SDK_VERSION}\"/" packages/sdk-python/pyproject.toml
          pnpm check:sdk-versions

      - name: Build Python distribution
        if: inputs.publish_pypi
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --sdist packages/sdk-python

      - name: Publish public npm packages
        if: inputs.publish_npm && !inputs.dry_run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm -r ${NPM_FILTERS} publish --no-git-checks --access public

      - name: Publish shadowob-sdk to PyPI
        if: inputs.publish_pypi && !inputs.dry_run
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          python -m twine upload packages/sdk-python/dist/*

      - name: Dry run summary
        if: inputs.dry_run
        run: |
          echo "dry_run=true, publish/tag/release steps were skipped."
          echo "built SDK artifacts and verified version consistency only."

      - name: Commit and tag release
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          VERSION="${SDK_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json packages/sdk-python/pyproject.toml pnpm-lock.yaml
          git commit -m "chore(release): packages v${VERSION}"
          git tag "sdk-v${VERSION}"
          git push
          git push --tags

      - name: Create GitHub Release
        if: inputs.create_release && !inputs.dry_run
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sdk-v${{ env.SDK_VERSION }}
          generate_release_notes: true
          body: |
            SDK release version: `${{ env.SDK_VERSION }}`

            Published packages:
            - npm: all public packages under `packages/`
            - PyPI: `shadowob-sdk==${{ env.SDK_VERSION }}`
