name: publish-packages

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      release_channel:
        description: Publish channel
        type: choice
        default: stable
        options:
          - stable
          - test
      publish_npm:
        description: Publish all public npm packages under packages/
        type: boolean
        default: true
      publish_pypi:
        description: Publish shadowob-sdk to PyPI
        type: boolean
        default: true
      create_release:
        description: Create GitHub Release after publishing
        type: boolean
        default: true
      dry_run:
        description: Dry run only (skip publish / tag / release)
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: publish-sdk
  cancel-in-progress: false

jobs:
  release-sdk:
    name: Publish SDK packages
    runs-on: ubuntu-latest
    environment: ShadowOB SDK

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Setup Python
        uses: actions/setup-python@v5
        if: inputs.publish_pypi
        with:
          python-version: "3.12"

      - name: Normalize GitHub git URLs to HTTPS
        shell: bash
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/

      - name: Install SDK workspace dependencies
        run: |
          pnpm install --frozen-lockfile \
            --filter ./packages/*... \
            --filter ./apps/flash/packages/*...

      - name: Compute publish targets and unified release version
        id: publish_targets
        shell: bash
        run: |
          TARGETS=$(node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')

          const cwd = process.cwd()
          const scanDirs = [
            path.resolve(cwd, 'packages'),
            path.resolve(cwd, 'apps', 'flash', 'packages'),
          ]

          function parseSemver(version) {
            const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(version)
            if (!match) throw new Error(`Unsupported version format: ${version}`)
            return {
              major: Number.parseInt(match[1], 10),
              minor: Number.parseInt(match[2], 10),
              patch: Number.parseInt(match[3], 10),
            }
          }

          function compareSemver(a, b) {
            const va = parseSemver(a)
            const vb = parseSemver(b)
            if (va.major !== vb.major) return va.major - vb.major
            if (va.minor !== vb.minor) return va.minor - vb.minor
            return va.patch - vb.patch
          }

          function bumpSemver(version, bumpType) {
            const v = parseSemver(version)
            if (bumpType === 'major') return `${v.major + 1}.0.0`
            if (bumpType === 'minor') return `${v.major}.${v.minor + 1}.0`
            return `${v.major}.${v.minor}.${v.patch + 1}`
          }

          const filters = []
          const versions = []
          for (const scanDir of scanDirs) {
            if (!fs.existsSync(scanDir)) continue
            const dirs = fs.readdirSync(scanDir).filter((d) => {
              const full = path.join(scanDir, d)
              return fs.statSync(full).isDirectory()
            })
            for (const dir of dirs) {
              const pkgJsonPath = path.join(scanDir, dir, 'package.json')
              if (!fs.existsSync(pkgJsonPath)) continue
              const pkg = JSON.parse(fs.readFileSync(pkgJsonPath, 'utf8'))
              if (pkg.private) continue
              filters.push(`--filter=${pkg.name}`)
              versions.push(pkg.version)
            }
          }

          const packagesDir = path.resolve(cwd, 'packages')
          const pyproject = fs.readFileSync(path.join(packagesDir, 'sdk-python', 'pyproject.toml'), 'utf8')
          const pyMatch = pyproject.match(/^version\s*=\s*"([^"]+)"/m)
          if (pyMatch) versions.push(pyMatch[1])

          if (versions.length === 0) {
            throw new Error('No versions found to compute release version')
          }

          const baseline = versions.sort(compareSemver).at(-1)
          const bumpType = process.env.BUMP_TYPE || 'patch'
          const releaseBaseVersion = bumpSemver(baseline, bumpType)

          const channel = process.env.RELEASE_CHANNEL || 'stable'
          const runNumber = process.env.GITHUB_RUN_NUMBER || '0'
          const runAttempt = process.env.GITHUB_RUN_ATTEMPT || '1'
          const testBuildNumber = `${runNumber}${runAttempt}`
          const releaseVersion = channel === 'test'
            ? `${releaseBaseVersion}-dev.${testBuildNumber}`
            : releaseBaseVersion
          const pythonVersion = channel === 'test'
            ? `${releaseBaseVersion}.dev${testBuildNumber}`
            : releaseBaseVersion

          process.stdout.write(JSON.stringify({
            filters: filters.join(' '),
            baseline,
            releaseBaseVersion,
            releaseVersion,
            pythonVersion,
            testBuildNumber,
          }))
          NODE
          )

          FILTERS=$(node -e "const d=JSON.parse(process.argv[1]); process.stdout.write(d.filters)" "$TARGETS")
          BASELINE=$(node -e "const d=JSON.parse(process.argv[1]); process.stdout.write(d.baseline)" "$TARGETS")
          RELEASE_BASE_VERSION=$(node -e "const d=JSON.parse(process.argv[1]); process.stdout.write(d.releaseBaseVersion)" "$TARGETS")
          RELEASE_VERSION=$(node -e "const d=JSON.parse(process.argv[1]); process.stdout.write(d.releaseVersion)" "$TARGETS")
          PYTHON_VERSION=$(node -e "const d=JSON.parse(process.argv[1]); process.stdout.write(d.pythonVersion)" "$TARGETS")
          TEST_BUILD_NUMBER=$(node -e "const d=JSON.parse(process.argv[1]); process.stdout.write(d.testBuildNumber)" "$TARGETS")

          if [ -z "$FILTERS" ]; then
            echo "No publishable npm packages found under packages/ or apps/flash/packages/."
            exit 1
          fi

          echo "npm_filters=$FILTERS" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "python_version=$PYTHON_VERSION" >> "$GITHUB_OUTPUT"
          echo "NPM_FILTERS=$FILTERS" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "PYTHON_VERSION=$PYTHON_VERSION" >> "$GITHUB_ENV"
          echo "TEST_BUILD_NUMBER=$TEST_BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "Publish filters: $FILTERS"
          echo "Version baseline: $BASELINE"
          echo "Release base version: $RELEASE_BASE_VERSION"
          echo "Release version: $RELEASE_VERSION"
          echo "Python version: $PYTHON_VERSION"
        env:
          BUMP_TYPE: ${{ inputs.bump }}
          RELEASE_CHANNEL: ${{ inputs.release_channel }}

      - name: Verify workspace dependencies before bump
        run: pnpm check:workspace-deps

      - name: Ensure connector is included in npm release targets
        if: inputs.publish_npm
        shell: bash
        run: |
          echo "$NPM_FILTERS"
          grep -q -- '--filter=@shadowob/connector' <<< "$NPM_FILTERS"

      - name: Bump all public npm package versions
        shell: bash
        run: |
          pnpm -r ${NPM_FILTERS} exec pnpm version "${RELEASE_VERSION}" --no-git-tag-version

      - name: Sync sdk-python version with npm SDK
        shell: bash
        run: |
          SDK_VERSION="${PYTHON_VERSION}"
          echo "SDK_VERSION=$SDK_VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version = \".*\"/version = \"${SDK_VERSION}\"/" packages/sdk-python/pyproject.toml
          if [ "${RELEASE_CHANNEL}" = "stable" ]; then
            pnpm check:sdk-versions
          else
            echo "Test channel uses npm ${RELEASE_VERSION} and Python ${PYTHON_VERSION} for registry-compatible prerelease syntax."
          fi
        env:
          RELEASE_CHANNEL: ${{ inputs.release_channel }}

      - name: Build npm publish artifacts
        if: inputs.publish_npm
        shell: bash
        run: |
          pnpm -r ${NPM_FILTERS} build

      - name: Build Python distribution
        if: inputs.publish_pypi
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --sdist packages/sdk-python

      - name: Publish public npm packages
        if: inputs.publish_npm && !inputs.dry_run
        run: |
          if [ "${RELEASE_CHANNEL}" = "test" ]; then
            PUBLISH_TAG="test"
          else
            PUBLISH_TAG="latest"
          fi
          pnpm -r ${NPM_FILTERS} publish --no-git-checks --access public --tag "${PUBLISH_TAG}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_CHANNEL: ${{ inputs.release_channel }}

      - name: Publish shadowob-sdk to PyPI
        if: inputs.publish_pypi && !inputs.dry_run
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          python -m twine upload packages/sdk-python/dist/*

      - name: Dry run summary
        if: inputs.dry_run
        run: |
          echo "dry_run=true, publish/tag/release steps were skipped."
          echo "built npm/python artifacts and verified version consistency only."

      - name: Verify published npm package metadata
        if: inputs.publish_npm && !inputs.dry_run
        shell: bash
        run: |
          node <<'NODE' > /tmp/shadow-published-npm-packages.txt
          const filters = process.env.NPM_FILTERS.split(/\s+/).filter(Boolean)
          for (const filter of filters) {
            const name = filter.replace(/^--filter=/, '')
            if (name) console.log(name)
          }
          NODE

          while read -r package_name; do
            [ -n "$package_name" ] || continue
            for attempt in 1 2 3 4 5 6; do
              if npm view "${package_name}@${RELEASE_VERSION}" version; then
                break
              fi
              if [ "$attempt" = "6" ]; then
                echo "Package ${package_name}@${RELEASE_VERSION} was not visible in the registry."
                exit 1
              fi
              sleep 10
            done
          done < /tmp/shadow-published-npm-packages.txt

      - name: Verify cold connector install from npm
        if: inputs.publish_npm && !inputs.dry_run
        shell: bash
        run: |
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          npm init -y
          npm install "@shadowob/connector@${RELEASE_VERSION}"
          node node_modules/@shadowob/connector/dist/cli.js plan \
            --target hermes \
            --server-url https://shadowob.example.com \
            --token test-token \
            --json > plan.json
          node <<'NODE'
          const fs = require('node:fs')
          const plan = fs.readFileSync('plan.json', 'utf8')
          if (plan.includes('--agent-id') || plan.includes('--channel-id')) {
            throw new Error('Hermes connector plan still contains static agent/channel flags')
          }
          NODE

      - name: Verify cold Python SDK install from PyPI
        if: inputs.publish_pypi && !inputs.dry_run
        shell: bash
        run: |
          python -m venv /tmp/shadow-sdk-verify
          for attempt in 1 2 3 4 5 6; do
            if /tmp/shadow-sdk-verify/bin/python -m pip install "shadowob-sdk==${PYTHON_VERSION}"; then
              break
            fi
            if [ "$attempt" = "6" ]; then
              echo "shadowob-sdk==${PYTHON_VERSION} was not installable from PyPI."
              exit 1
            fi
            sleep 10
          done
          /tmp/shadow-sdk-verify/bin/python - <<'PY'
          from shadowob_sdk import ShadowClient, ShadowSocket

          print(ShadowClient.__name__, ShadowSocket.__name__)
          PY

      - name: Test publish summary
        if: inputs.release_channel == 'test' && !inputs.dry_run
        run: |
          {
            echo "## Test package publish"
            echo
            echo "- npm version: \`${RELEASE_VERSION}\`"
            echo "- Python version: \`${PYTHON_VERSION}\`"
            echo "- npm dist-tag: \`test\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and tag release
        if: ${{ inputs.release_channel == 'stable' && !inputs.dry_run }}
        shell: bash
        run: |
          VERSION="${SDK_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json apps/flash/packages/*/package.json packages/sdk-python/pyproject.toml pnpm-lock.yaml
          git commit -m "chore(release): packages v${VERSION}"
          git tag "sdk-v${VERSION}"
          git push
          git push --tags

      - name: Create GitHub Release
        if: inputs.release_channel == 'stable' && inputs.create_release && !inputs.dry_run
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sdk-v${{ env.SDK_VERSION }}
          generate_release_notes: true
          body: |
            SDK release version: `${{ env.SDK_VERSION }}`

            Published packages:
            - npm: all public packages under `packages/` and `apps/flash/packages/`
            - PyPI: `shadowob-sdk==${{ env.SDK_VERSION }}`
