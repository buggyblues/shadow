name: post-merge-validation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: post-merge-${{ github.sha }}
  cancel-in-progress: true

jobs:
  full-test-suite:
    name: Full test suite (post-merge)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Free disk space for Docker tests
        shell: bash
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run full test suite in container
        run: |
          docker compose -f docker-compose.ci-tests.yml up --build --abort-on-container-exit --exit-code-from ci-tests ci-tests

      - name: Cleanup Docker
        if: always()
        run: docker compose -f docker-compose.ci-tests.yml down -v --remove-orphans

  build-validation:
    name: Build all apps (post-merge)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Free disk space for Docker build
        shell: bash
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run build validation in container
        run: |
          docker compose -f docker-compose.ci-build.yml up --build --abort-on-container-exit --exit-code-from build-check build-check

      - name: Cleanup Docker
        if: always()
        run: docker compose -f docker-compose.ci-build.yml down -v --remove-orphans

  e2e-regression:
    name: E2E regression (post-merge)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Free disk space for Docker E2E
        shell: bash
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run E2E tests in container
        run: |
          docker compose -f docker-compose.e2e.yml up --build --abort-on-container-exit --exit-code-from e2e-runner e2e-runner

      - name: Cleanup Docker
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v --remove-orphans
