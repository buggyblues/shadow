name: release-desktop-test

on:
  workflow_run:
    workflows: [post-merge-validation]
    types: [completed]
  schedule:
    # 09:20 Asia/Shanghai. This catches changes that were skipped after the
    # daily release already happened.
    - cron: '20 1 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Publish even if today already has a desktop test release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: desktop-test-release
  cancel-in-progress: false

jobs:
  gate:
    name: Detect releasable desktop changes
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    outputs:
      should_release: ${{ steps.gate.outputs.should_release }}
      tag: ${{ steps.gate.outputs.tag }}
      release_name: ${{ steps.gate.outputs.release_name }}
      base: ${{ steps.gate.outputs.base }}
      head_sha: ${{ steps.gate.outputs.head_sha }}
      changed_files: ${{ steps.gate.outputs.changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Decide whether to publish
        id: gate
        shell: bash
        env:
          FORCE: ${{ inputs.force || 'false' }}
        run: |
          set -euo pipefail
          git fetch --force --tags

          today="$(TZ=Asia/Shanghai date +%Y%m%d)"
          display_date="$(TZ=Asia/Shanghai date +%Y-%m-%d)"
          daily_tag="desktop-test-${today}"
          tag="$daily_tag"
          release_name="Shadow Desktop Test ${display_date}"
          force="${FORCE:-false}"
          head_sha="$(git rev-parse HEAD)"

          if [ "$force" != "true" ] && git rev-parse -q --verify "refs/tags/${daily_tag}" >/dev/null; then
            {
              echo "should_release=false"
              echo "tag=${daily_tag}"
              echo "release_name=${release_name}"
              echo "base="
              echo "head_sha=${head_sha}"
              echo "changed_files="
            } >> "$GITHUB_OUTPUT"
            echo "Desktop test release already exists for ${today}: ${daily_tag}"
            exit 0
          fi

          if [ "$force" = "true" ] && git rev-parse -q --verify "refs/tags/${daily_tag}" >/dev/null; then
            tag="${daily_tag}-${GITHUB_RUN_NUMBER}"
            release_name="${release_name} #${GITHUB_RUN_NUMBER}"
          fi

          base="$(git tag --list 'desktop-test-*' --sort=-creatordate | head -n 1 || true)"
          if [ -n "$base" ]; then
            range="${base}..HEAD"
          elif git rev-parse -q --verify HEAD^ >/dev/null; then
            range="HEAD^..HEAD"
          else
            range="HEAD"
          fi

          changed="$(
            git diff --name-only "$range" -- \
              apps/desktop \
              packages/openclaw-shadowob \
              packages/sdk \
              packages/shared \
              packages/ui \
              package.json \
              pnpm-lock.yaml \
              pnpm-workspace.yaml \
            | sed '/^$/d'
          )"

          if [ -z "$changed" ] && [ "$force" != "true" ]; then
            should_release=false
            echo "No desktop-relevant changes since ${base:-previous commit}."
          else
            should_release=true
          fi

          {
            echo "should_release=${should_release}"
            echo "tag=${tag}"
            echo "release_name=${release_name}"
            echo "base=${base}"
            echo "head_sha=${head_sha}"
            echo "changed_files<<EOF"
            echo "$changed"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-artifacts:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }}
    needs: gate
    if: needs.gate.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            arch: x64
            runner: macos-latest
            command: pnpm --dir ./apps/desktop exec node scripts/release.mjs --platform=darwin --arch=x64 --mode=make
            artifact_name: desktop-test-macos-x64
            artifact_paths: apps/desktop/out/release-upload/*
          - platform: macos
            arch: arm64
            runner: macos-latest
            command: pnpm --dir ./apps/desktop exec node scripts/release.mjs --platform=darwin --arch=arm64 --mode=make
            artifact_name: desktop-test-macos-arm64
            artifact_paths: apps/desktop/out/release-upload/*
          - platform: windows
            arch: x64
            runner: windows-latest
            command: pnpm --dir ./apps/desktop release:win
            artifact_name: desktop-test-windows-x64
            artifact_paths: apps/desktop/out/release-upload/*
          - platform: linux
            arch: x64
            runner: ubuntu-latest
            command: pnpm --dir ./apps/desktop release:linux
            artifact_name: desktop-test-linux-x64
            artifact_paths: apps/desktop/out/release-upload/*
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate icons
        run: pnpm --dir ./apps/desktop generate-icons

      - name: Build desktop test artifacts
        run: ${{ matrix.command }}

      - name: List make output
        if: always()
        shell: bash
        run: find apps/desktop/out/make -type f 2>/dev/null || echo "No make output found"

      - name: Prepare uniquely named release assets
        shell: bash
        run: |
          set -euo pipefail
          upload_dir="apps/desktop/out/release-upload"
          rm -rf "$upload_dir"
          mkdir -p "$upload_dir"

          while IFS= read -r file; do
            filename="$(basename "$file")"
            extension="${filename##*.}"
            stem="${filename%.*}"
            cp "$file" "$upload_dir/${stem}-${{ matrix.platform }}-${{ matrix.arch }}.${extension}"
          done < <(find apps/desktop/out/make -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' \))

          find "$upload_dir" -type f

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  publish-release:
    name: Publish desktop test release
    runs-on: ubuntu-latest
    needs: [gate, build-artifacts]
    if: needs.gate.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download desktop artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Create release notes
        shell: bash
        run: |
          set -euo pipefail
          base="${{ needs.gate.outputs.base }}"
          {
            echo "Automated desktop test release."
            echo ""
            echo "- Commit: ${{ needs.gate.outputs.head_sha }}"
            echo "- Daily marker: ${{ needs.gate.outputs.tag }}"
            if [ -n "$base" ]; then
              echo "- Changes since: ${base}"
            fi
            echo ""
            echo "Changed files:"
            echo '```'
            printf '%s\n' "${{ needs.gate.outputs.changed_files }}"
            echo '```'
          } > release-notes.md

      - name: Create release tag
        id: create_tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.gate.outputs.tag }}" -m "${{ needs.gate.outputs.release_name }}"
          git push origin "${{ needs.gate.outputs.tag }}"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub prerelease
        id: publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.gate.outputs.tag }}
          name: ${{ needs.gate.outputs.release_name }}
          body_path: release-notes.md
          prerelease: true
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.exe
            release-assets/**/*.zip
          fail_on_unmatched_files: true

      - name: Roll back release marker on publish failure
        if: failure() && steps.create_tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          gh release delete "${{ needs.gate.outputs.tag }}" --yes
          git push --delete origin "${{ needs.gate.outputs.tag }}"
