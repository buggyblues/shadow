name: stale

on:
  schedule:
    - cron: '0 0 * * 0'    # Every Sunday at midnight UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been inactive for 30 days. It will be closed in 7 days
            if there's no further activity. Please comment if this is still relevant.
          stale-pr-message: >
            This PR has been inactive for 14 days. It will be closed in 7 days
            if there's no further activity. Please update or comment if still in progress.
          stale-issue-label: stale
          stale-pr-label: stale
          days-before-issue-stale: 30
          days-before-pr-stale: 14
          days-before-issue-close: 7
          days-before-pr-close: 7
          exempt-issue-labels: 'pinned,security,bug'
          exempt-pr-labels: 'pinned,security'
