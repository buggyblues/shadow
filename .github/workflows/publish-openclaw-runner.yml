name: Publish runner images

on:
  push:
    branches:
      - main
    paths:
      - 'apps/cloud/images/**-runner/**'
      - 'apps/cloud/src/runtimes/**'
      - 'packages/openclaw-shadowob/**'
      - 'packages/connector/**'
      - 'packages/sdk/**'
      - 'packages/shared/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'
      image:
        description: 'Runner image to publish, or all'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - openclaw-runner
          - claude-runner
          - codex-runner
          - gemini-runner
          - opencode-runner
          - hermes-runner

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & push ${{ matrix.image }} multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: openclaw-runner
            image_name: buggyblues/openclaw-runner
            dockerfile: apps/cloud/images/openclaw-runner/Dockerfile
          - image: claude-runner
            image_name: buggyblues/claude-runner
            dockerfile: apps/cloud/images/claude-runner/Dockerfile
          - image: codex-runner
            image_name: buggyblues/codex-runner
            dockerfile: apps/cloud/images/codex-runner/Dockerfile
          - image: gemini-runner
            image_name: buggyblues/gemini-runner
            dockerfile: apps/cloud/images/gemini-runner/Dockerfile
          - image: opencode-runner
            image_name: buggyblues/opencode-runner
            dockerfile: apps/cloud/images/opencode-runner/Dockerfile
          - image: hermes-runner
            image_name: buggyblues/hermes-runner
            dockerfile: apps/cloud/images/hermes-runner/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          df -h
          sudo rm -rf \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /usr/share/swift
          sudo docker system prune -af --volumes || true
          df -h

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build local Shadow packages
        run: pnpm build:packages

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ github.event.inputs.tag || 'latest' }}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build and push
        if: github.event_name != 'workflow_dispatch' || inputs.image == 'all' || inputs.image == matrix.image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
