name: Publish runner images

on:
  workflow_run:
    workflows: [post-merge-validation]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'
      image:
        description: 'Runner image to publish, or all'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - openclaw-runner
          - claude-runner
          - codex-runner
          - opencode-runner
          - hermes-runner

env:
  REGISTRY: ghcr.io

jobs:
  determine-changes:
    name: Detect runner image changes
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event.workflow_run.conclusion == 'success' &&
        !startsWith(github.event.workflow_run.head_commit.message || '', 'chore(release): packages v'))
      }}
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.filter.outputs.should_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Detect runner-related changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git show --pretty='' --name-only HEAD)"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(apps/cloud/images/.+-runner/|apps/cloud/src/runtimes/|packages/openclaw-shadowob/|packages/connector/|packages/sdk/|packages/shared/|package\.json$|pnpm-lock\.yaml$)'; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Runner image publish skipped"
              echo
              echo "No runner-related files changed in this main-branch merge."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  build-and-push:
    name: Build & push ${{ matrix.image }} multi-arch image
    needs: determine-changes
    if: github.event_name == 'workflow_dispatch' || needs.determine-changes.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: openclaw-runner
            image_name: buggyblues/openclaw-runner
            dockerfile: apps/cloud/images/openclaw-runner/Dockerfile
          - image: claude-runner
            image_name: buggyblues/claude-runner
            dockerfile: apps/cloud/images/claude-runner/Dockerfile
          - image: codex-runner
            image_name: buggyblues/codex-runner
            dockerfile: apps/cloud/images/codex-runner/Dockerfile
          - image: opencode-runner
            image_name: buggyblues/opencode-runner
            dockerfile: apps/cloud/images/opencode-runner/Dockerfile
          - image: hermes-runner
            image_name: buggyblues/hermes-runner
            dockerfile: apps/cloud/images/hermes-runner/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Free disk space
        run: |
          df -h
          sudo rm -rf \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /usr/share/swift
          sudo docker system prune -af --volumes || true
          df -h

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build local Shadow packages
        run: pnpm build:packages

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ github.event.inputs.tag || 'latest' }}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build and push
        if: github.event_name != 'workflow_dispatch' || inputs.image == 'all' || inputs.image == matrix.image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=min,scope=${{ matrix.image }},ignore-error=true
