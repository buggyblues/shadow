name: Publish runner images

on:
  workflow_run:
    workflows: [post-merge-validation]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'
      image:
        description: 'Runner image to publish, or all'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - openclaw-runner
          - claude-runner
          - codex-runner
          - opencode-runner
          - hermes-runner

env:
  REGISTRY: ghcr.io

jobs:
  determine-changes:
    name: Select runner image publish
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event.workflow_run.conclusion == 'success'
      }}
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.filter.outputs.should_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Publish runners for every deployable main revision
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          {
            echo "## Runner image publish selected"
            echo
            echo "Publishing runner images for the same revision used by production deploys."
          } >> "$GITHUB_STEP_SUMMARY"

  build-and-push:
    name: Build & push ${{ matrix.image }} multi-arch image
    needs: determine-changes
    if: github.event_name == 'workflow_dispatch' || needs.determine-changes.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: openclaw-runner
            image_name: buggyblues/openclaw-runner
            dockerfile: apps/cloud/images/openclaw-runner/Dockerfile
          - image: claude-runner
            image_name: buggyblues/claude-runner
            dockerfile: apps/cloud/images/claude-runner/Dockerfile
          - image: codex-runner
            image_name: buggyblues/codex-runner
            dockerfile: apps/cloud/images/codex-runner/Dockerfile
          - image: opencode-runner
            image_name: buggyblues/opencode-runner
            dockerfile: apps/cloud/images/opencode-runner/Dockerfile
          - image: hermes-runner
            image_name: buggyblues/hermes-runner
            dockerfile: apps/cloud/images/hermes-runner/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Free disk space
        run: |
          df -h
          sudo rm -rf \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /usr/share/swift
          sudo docker system prune -af --volumes || true
          df -h

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build local Shadow packages
        run: pnpm build:packages

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: image
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EXTRA_TAG: ${{ github.event.inputs.tag || '' }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          IMAGE_NAME: ${{ matrix.image_name }}
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_NAME}"
          short_sha="$(printf '%s' "$HEAD_SHA" | cut -c1-12)"
          branch_tag="$(printf '%s' "$HEAD_BRANCH" | tr '[:upper:]' '[:lower:]' | tr '/' '-' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+|-+$//g')"
          smoke_tag="sha-${short_sha}"

          {
            echo "ref=${image}:sha-${short_sha}"
            echo "tags<<EOF"
            echo "${image}:sha-${short_sha}"
            if [ -n "$branch_tag" ]; then
              echo "${image}:${branch_tag}"
            fi
            if [ "$HEAD_BRANCH" = "main" ]; then
              echo "${image}:latest"
            fi
            if [ -n "$EXTRA_TAG" ]; then
              echo "${image}:${EXTRA_TAG}"
              smoke_tag="$EXTRA_TAG"
            elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
              smoke_tag="latest"
            fi
            echo "EOF"
            echo "smoke_tag=${smoke_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        if: github.event_name != 'workflow_dispatch' || inputs.image == 'all' || inputs.image == matrix.image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=min,scope=${{ matrix.image }},ignore-error=true

      - name: Smoke test published image
        if: github.event_name != 'workflow_dispatch' || inputs.image == 'all' || inputs.image == matrix.image
        env:
          IMAGE_TAG: ${{ steps.image.outputs.smoke_tag }}
        run: |
          docker pull "${{ env.REGISTRY }}/${{ matrix.image_name }}:${IMAGE_TAG}"
          SHADOWOB_RUNNER_IMAGE_TAG="${IMAGE_TAG}" pnpm --dir apps/cloud exec node scripts/smoke-test-images.mjs "${{ matrix.image }}"
