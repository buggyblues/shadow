name: release-desktop

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to attach assets to (e.g. v0.1.0-beta)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-release-notes:
    name: Update release notes from changelog
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'release' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Read changelog and update release body
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANGELOG="apps/desktop/changelogs/v${{ steps.version.outputs.version }}.md"
          if [ -f "$CHANGELOG" ]; then
            echo "Found changelog: $CHANGELOG"
            # Append changelog to existing release body
            gh release view "${{ steps.version.outputs.tag }}" --json body -q .body > /tmp/current_body.txt || true
            {
              cat /tmp/current_body.txt
              echo ""
              echo "---"
              echo ""
              cat "$CHANGELOG"
            } > /tmp/new_body.txt
            gh release edit "${{ steps.version.outputs.tag }}" --notes-file /tmp/new_body.txt
            echo "Release notes updated from changelog"
          else
            echo "No changelog found at $CHANGELOG — skipping"
          fi

  build-macos-notarized:
    name: macOS ${{ matrix.arch }} notarized
    runs-on: ${{ matrix.runner }}
    environment: ShadowOB Mac
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-13
          - arch: arm64
            runner: macos-latest
    env:
      APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Prepare App Store Connect API key
        run: |
          if [ -n "${APPLE_API_KEY_P8:-}" ]; then
            mkdir -p ./.secrets
            printf '%s' "$APPLE_API_KEY_P8" > ./.secrets/AuthKey_${APPLE_API_KEY_ID}.p8
            echo "APPLE_API_KEY=$PWD/.secrets/AuthKey_${APPLE_API_KEY_ID}.p8" >> "$GITHUB_ENV"
            echo "Using App Store Connect API key notarization"
          else
            echo "APPLE_API_KEY_P8 not provided"
            echo "API-key notarization requires APPLE_API_KEY_P8, APPLE_API_KEY_ID, APPLE_API_ISSUER"
            exit 1
          fi

      - name: Import Apple certificate
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          python3 - <<'PY'
          import base64, os
          data = os.environ['APPLE_CERT_P12_BASE64']
          with open('certificate.p12', 'wb') as f:
              f.write(base64.b64decode(data))
          PY
          security import certificate.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain

      - name: Generate icons
        run: pnpm --dir ./apps/desktop generate-icons

      - name: Build notarized DMG/ZIP
        run: pnpm --dir ./apps/desktop release:mac:${{ matrix.arch }}

      - name: List make output for debugging
        if: always()
        run: find apps/desktop/out/make -type f 2>/dev/null || echo "No make output found"

      - name: Upload release assets
        if: ${{ github.event_name == 'release' || github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          files: |
            apps/desktop/out/make/**/*.dmg
            apps/desktop/out/make/**/*.zip
          fail_on_unmatched_files: true

  build-cross-platform:
    name: ${{ matrix.platform }} build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            make_script: release:win
            files: apps/desktop/out/make/squirrel.windows/**/*.exe
          - platform: linux
            runner: ubuntu-latest
            make_script: release:linux
            files: apps/desktop/out/make/**/*.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Generate icons
        run: pnpm --dir ./apps/desktop generate-icons

      - name: Build release artifacts
        run: pnpm --dir ./apps/desktop ${{ matrix.make_script }}

      - name: List make output for debugging
        if: always()
        shell: bash
        run: find apps/desktop/out/make -type f 2>/dev/null || echo "No make output found"

      - name: Upload release assets
        if: ${{ github.event_name == 'release' || github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          files: ${{ matrix.files }}
          fail_on_unmatched_files: true
