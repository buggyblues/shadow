name: release-desktop

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to attach assets to (e.g. v0.1.0-beta)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos-notarized:
    name: macOS ${{ matrix.arch }} notarized
    runs-on: macos-latest
    environment: ShadowOB Mac
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
          - arch: arm64
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Prepare App Store Connect API key
        run: |
          if [ -n "${APPLE_API_KEY_P8:-}" ]; then
            mkdir -p ./.secrets
            printf '%s' "$APPLE_API_KEY_P8" > ./.secrets/AuthKey_${APPLE_API_KEY_ID}.p8
            echo "APPLE_API_KEY=$PWD/.secrets/AuthKey_${APPLE_API_KEY_ID}.p8" >> "$GITHUB_ENV"
            echo "Using App Store Connect API key notarization"
          else
            echo "APPLE_API_KEY_P8 not provided, fallback to Apple ID notarization"
          fi

      - name: Import Apple certificate
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          python3 - <<'PY'
          import base64, os
          data = os.environ['APPLE_CERT_P12_BASE64']
          with open('certificate.p12', 'wb') as f:
              f.write(base64.b64decode(data))
          PY
          security import certificate.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain

      - name: Build notarized DMG/ZIP
        run: pnpm --dir ./apps/desktop release:mac:${{ matrix.arch }}

      - name: Upload release assets
        if: ${{ github.event_name == 'release' || github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          files: |
            apps/desktop/out/make/**/*.dmg
            apps/desktop/out/make/**/*.zip
          fail_on_unmatched_files: false

  build-cross-platform:
    name: ${{ matrix.platform }} build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            make_script: release:win
            files: apps/desktop/out/make/**/*.exe
          - platform: linux
            runner: ubuntu-latest
            make_script: release:linux
            files: apps/desktop/out/make/**/*.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Build release artifacts
        run: pnpm --dir ./apps/desktop ${{ matrix.make_script }}

      - name: Upload release assets
        if: ${{ github.event_name == 'release' || github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          files: ${{ matrix.files }}
          fail_on_unmatched_files: false
