name: release-desktop

on:
  workflow_run:
    workflows: [post-merge-validation]
    types: [completed]
  workflow_dispatch:
    inputs:
      force:
        description: 'Publish even if there are no new desktop release changes'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: desktop-stable-release
  cancel-in-progress: true

jobs:
  gate:
    name: Detect releasable desktop changes
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_commit.author.name != 'dependabot[bot]' &&
      !contains(github.event.workflow_run.head_commit.message || '', 'dependabot[bot]') &&
      !startsWith(github.event.workflow_run.head_commit.message || '', 'chore(release): mobile v') &&
      !startsWith(github.event.workflow_run.head_commit.message || '', 'chore(release): desktop v') &&
      !startsWith(github.event.workflow_run.head_commit.message || '', 'chore(release): apps v'))
    outputs:
      should_release: ${{ steps.gate.outputs.should_release }}
      base: ${{ steps.gate.outputs.base }}
      head_sha: ${{ steps.gate.outputs.head_sha }}
      changed_files: ${{ steps.gate.outputs.changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Decide whether to publish
        id: gate
        shell: bash
        env:
          FORCE: ${{ inputs.force || 'false' }}
        run: |
          set -euo pipefail
          git fetch --force origin "+refs/heads/main:refs/remotes/origin/main" --tags

          force="${FORCE:-false}"
          head_sha="$(git rev-parse HEAD)"
          latest_main_sha="$(git rev-parse refs/remotes/origin/main)"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ] && [ "$head_sha" != "$latest_main_sha" ]; then
            {
              echo "should_release=false"
              echo "base="
              echo "head_sha=${head_sha}"
              echo "changed_files="
            } >> "$GITHUB_OUTPUT"
            echo "Skipping stale desktop release for ${head_sha}; current main is ${latest_main_sha}."
            exit 0
          fi

          base="$(git tag --list 'desktop-v*' --sort=-creatordate | head -n 1 || true)"

          if [ -n "$base" ]; then
            range="${base}..HEAD"
          elif git rev-parse -q --verify HEAD^ >/dev/null; then
            range="HEAD^..HEAD"
          else
            range="HEAD"
          fi

          changed="$(
            git diff --name-only "$range" -- \
              .github/workflows/release-desktop-artifacts.yml \
              .github/workflows/release-desktop.yml \
              apps/desktop \
              apps/server/src/handlers/desktop-release.handler.ts \
              packages/connector \
              packages/openclaw-shadowob \
              packages/sdk \
              packages/shared \
              packages/ui \
              package.json \
              pnpm-lock.yaml \
              pnpm-workspace.yaml \
              scripts/prepare-app-release-version.mjs \
            | sed '/^$/d'
          )"

          if [ -z "$changed" ] && [ "$force" != "true" ]; then
            should_release=false
            echo "No desktop release relevant changes since ${base:-previous commit}."
          else
            should_release=true
          fi

          {
            echo "should_release=${should_release}"
            echo "base=${base}"
            echo "head_sha=${head_sha}"
            echo "changed_files<<EOF"
            echo "$changed"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  prepare-release-version:
    name: Prepare stable desktop release version
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.should_release == 'true'
    concurrency:
      group: app-release-version-${{ needs.gate.outputs.head_sha }}
      cancel-in-progress: false
    outputs:
      version: ${{ steps.version.outputs.version }}
      desktop_release_tag: ${{ steps.version.outputs.desktop_release_tag }}
      desktop_version_tag: ${{ steps.version.outputs.desktop_version_tag }}
      release_sha: ${{ steps.commit.outputs.release_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Prepare version commit
        id: version
        shell: bash
        env:
          FORCE: ${{ inputs.force || 'false' }}
          RELEASE_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
        run: |
          set -euo pipefail
          git fetch origin "+refs/heads/${RELEASE_BRANCH}:refs/remotes/origin/${RELEASE_BRANCH}" --tags
          git checkout -B "${RELEASE_BRANCH}" "origin/${RELEASE_BRANCH}"
          node scripts/prepare-app-release-version.mjs \
            --target=desktop \
            --source-sha="${{ needs.gate.outputs.head_sha }}" \
            --force="${FORCE}"

      - name: Commit version bump
        id: commit
        shell: bash
        env:
          RELEASE_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/package.json
          if git diff --cached --quiet; then
            echo "Stable desktop version already prepared."
          else
            git commit \
              -m "chore(release): desktop v${{ steps.version.outputs.version }}" \
              -m "Release-Source-SHA: ${{ needs.gate.outputs.head_sha }}" \
              -m "Release-Target: desktop"
            git push origin "HEAD:${RELEASE_BRANCH}"
          fi
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  publish-release:
    name: Build and publish stable desktop release
    needs: [gate, prepare-release-version]
    if: needs.gate.outputs.should_release == 'true'
    uses: ./.github/workflows/release-desktop-artifacts.yml
    with:
      release_sha: ${{ needs.prepare-release-version.outputs.release_sha }}
      source_sha: ${{ needs.gate.outputs.head_sha }}
      version: ${{ needs.prepare-release-version.outputs.version }}
      release_tag: ${{ needs.prepare-release-version.outputs.desktop_release_tag }}
      desktop_version_tag: ${{ needs.prepare-release-version.outputs.desktop_version_tag }}
      release_name: Shadow Desktop v${{ needs.prepare-release-version.outputs.version }}
      channel: stable
      prerelease: false
      base: ${{ needs.gate.outputs.base }}
      changed_files: ${{ needs.gate.outputs.changed_files }}
    secrets: inherit
