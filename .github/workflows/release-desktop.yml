name: release-desktop

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-notarized:
    name: macOS ${{ matrix.arch }} notarized
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-13
          - arch: arm64
            runner: macos-14
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Prepare App Store Connect API key
        if: ${{ secrets.APPLE_API_KEY_P8 != '' }}
        run: |
          mkdir -p ./.secrets
          printf '%s' "${{ secrets.APPLE_API_KEY_P8 }}" > ./.secrets/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          echo "APPLE_API_KEY=$PWD/.secrets/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8" >> "$GITHUB_ENV"

      - name: Import Apple certificate
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain

      - name: Build notarized DMG/ZIP
        run: pnpm --dir ./apps/desktop release:mac:${{ matrix.arch }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/out/make/**/*.dmg
            apps/desktop/out/make/**/*.zip

  build-cross-platform:
    name: ${{ matrix.platform }} build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            make_script: release:win
            files: apps/desktop/out/make/**/*.exe
          - platform: linux
            runner: ubuntu-latest
            make_script: release:linux
            files: |
              apps/desktop/out/make/**/*.zip
              apps/desktop/out/make/**/*.deb
              apps/desktop/out/make/**/*.rpm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Build release artifacts
        run: pnpm --dir ./apps/desktop ${{ matrix.make_script }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.files }}
