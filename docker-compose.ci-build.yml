name: shadow-ci-build

services:
  build-check:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    working_dir: /workspace
    init: true
    command: >-
      bash -lc '
        set -euo pipefail
        echo "=== Building shared packages ==="
        pnpm build:packages

        echo "=== Checking app builds ==="

        echo "--- Building @shadowob/server ---"
        pnpm --filter @shadowob/server build

        echo "--- Building @shadowob/web ---"
        pnpm --filter @shadowob/web build

        echo "--- Building @shadowob/admin ---"
        pnpm --filter @shadowob/admin build

        echo "=== All builds passed ==="
      '
