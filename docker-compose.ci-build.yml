name: shadow-ci-build

services:
  build-check:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    working_dir: /workspace
    init: true
    command: >-
      bash -lc '
        set -euo pipefail
        echo "=== Checking package builds ==="

        echo "--- Building @shadowob/shared ---"
        pnpm --filter @shadowob/shared build

        echo "--- Building @shadowob/sdk ---"
        pnpm --filter @shadowob/sdk build

        echo "--- Building @shadowob/server ---"
        pnpm --filter @shadowob/server build

        echo "--- Building @shadowob/web ---"
        pnpm --filter @shadowob/web build

        echo "--- Building @shadowob/admin ---"
        pnpm --filter @shadowob/admin build

        echo "--- Building @shadowob/cli ---"
        pnpm --filter @shadowob/cli build

        echo "=== All builds passed ==="
      '
