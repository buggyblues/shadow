# Production docker-compose for public deployment.
#
# Runtime hosts should pull CI-built application images instead of building
# from source. The app image defaults match .github/workflows/publish-prod-images.yml.
#
# Usage:
#   docker compose -f docker-compose.prod.yml pull server web admin
#   docker compose -f docker-compose.prod.yml up -d --remove-orphans --no-build
#
# ⚠️  All sensitive values MUST be provided via a .env file.
#     See .env.example for required variables.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-shadow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-shadow}']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    image: ${SHADOWOB_IMAGE_REGISTRY:-ghcr.io}/${SHADOWOB_IMAGE_NAMESPACE:-buggyblues}/shadow-server:${SHADOWOB_IMAGE_TAG:-latest}
    pull_policy: always
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-shadow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shadow}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3002
      HOST: 0.0.0.0
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-shadow}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@shadowob.app}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      OAUTH_BASE_URL: ${OAUTH_BASE_URL:?OAUTH_BASE_URL is required}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SHADOWOB_MODEL_PROXY_ENABLED: ${SHADOWOB_MODEL_PROXY_ENABLED:-true}
      SHADOWOB_MODEL_PROXY_MODEL: ${SHADOWOB_MODEL_PROXY_MODEL:-deepseek-v4-flash}
      SHADOWOB_MODEL_PROXY_UPSTREAM_BASE_URL: ${SHADOWOB_MODEL_PROXY_UPSTREAM_BASE_URL:-https://api.deepseek.com}
      SHADOWOB_MODEL_PROXY_UPSTREAM_API_KEY: ${SHADOWOB_MODEL_PROXY_UPSTREAM_API_KEY:-}
      SHADOWOB_MODEL_PROXY_SHRIMP_PER_CNY: ${SHADOWOB_MODEL_PROXY_SHRIMP_PER_CNY:-20}
      SHADOWOB_MODEL_PROXY_INPUT_CACHE_HIT_CNY_PER_MILLION: ${SHADOWOB_MODEL_PROXY_INPUT_CACHE_HIT_CNY_PER_MILLION:-0.02}
      SHADOWOB_MODEL_PROXY_INPUT_CACHE_MISS_CNY_PER_MILLION: ${SHADOWOB_MODEL_PROXY_INPUT_CACHE_MISS_CNY_PER_MILLION:-1}
      SHADOWOB_MODEL_PROXY_OUTPUT_CNY_PER_MILLION: ${SHADOWOB_MODEL_PROXY_OUTPUT_CNY_PER_MILLION:-2}
      SHADOWOB_MODEL_PROXY_BILLING_MODE: ${SHADOWOB_MODEL_PROXY_BILLING_MODE:-}
      SHADOWOB_MODEL_PROXY_TOKENS_PER_SHRIMP: ${SHADOWOB_MODEL_PROXY_TOKENS_PER_SHRIMP:-}
      SHADOWOB_MODEL_PROXY_INPUT_TOKENS_PER_SHRIMP: ${SHADOWOB_MODEL_PROXY_INPUT_TOKENS_PER_SHRIMP:-}
      SHADOWOB_MODEL_PROXY_OUTPUT_TOKENS_PER_SHRIMP: ${SHADOWOB_MODEL_PROXY_OUTPUT_TOKENS_PER_SHRIMP:-}
      KMS_MASTER_KEY: ${KMS_MASTER_KEY:?KMS_MASTER_KEY is required}
      CLOUD_TEMPLATES_DIR: /app/apps/cloud/templates
      POLL_INTERVAL_MS: ${CLOUD_WORKER_POLL_INTERVAL_MS:-5000}
      RECONCILE_INTERVAL_MS: ${RECONCILE_INTERVAL_MS:-60000}
      SHADOWOB_SERVER_URL: ${SHADOWOB_SERVER_URL:?SHADOWOB_SERVER_URL is required}
      SHADOWOB_PROVISION_URL: ${SHADOWOB_PROVISION_URL:-http://server:3002}
      SHADOWOB_OPENCLAW_RUNNER_IMAGE: ${SHADOWOB_OPENCLAW_RUNNER_IMAGE:-ghcr.io/buggyblues/openclaw-runner:latest}
      PULUMI_CONFIG_PASSPHRASE: ${PULUMI_CONFIG_PASSPHRASE:?PULUMI_CONFIG_PASSPHRASE is required}
      PULUMI_BACKEND_URL: ${PULUMI_BACKEND_URL:-file:///home/node/.shadowob/pulumi}
      KUBECONFIG: ${KUBECONFIG_CONTAINER_PATH:-/home/node/.kube/config}
      KUBECONFIG_CONTEXT: ${KUBECONFIG_CONTEXT:-}
      KUBECONFIG_LOOPBACK_HOST: ${KUBECONFIG_LOOPBACK_HOST:-}
      CLOUD_SAAS_CLUSTER_CONFIG: ${CLOUD_SAAS_CLUSTER_CONFIG:-}
      CLOUD_SAAS_CLUSTER_KUBECONFIG: ${CLOUD_SAAS_CLUSTER_KUBECONFIG:-}
      CLOUD_SAAS_WORKLOAD_BACKEND: ${CLOUD_SAAS_WORKLOAD_BACKEND:-auto}
    volumes:
      - ${KUBECONFIG_HOST_PATH:-/dev/null}:${KUBECONFIG_CONTAINER_PATH:-/home/node/.kube/config}:ro
      - ${CLOUD_SAAS_CLUSTER_CONFIG_HOST_PATH:-/dev/null}:${CLOUD_SAAS_CLUSTER_CONFIG:-/app/cluster.json}:ro
      - ${CLOUD_SAAS_CLUSTER_KUBECONFIG_HOST_PATH:-/dev/null}:${CLOUD_SAAS_CLUSTER_KUBECONFIG:-/home/node/.shadow-cloud/clusters/cluster.yaml}:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    image: ${SHADOWOB_IMAGE_REGISTRY:-ghcr.io}/${SHADOWOB_IMAGE_NAMESPACE:-buggyblues}/shadow-web:${SHADOWOB_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - server

  admin:
    image: ${SHADOWOB_IMAGE_REGISTRY:-ghcr.io}/${SHADOWOB_IMAGE_NAMESPACE:-buggyblues}/shadow-admin:${SHADOWOB_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - '3001:3001'
    depends_on:
      - server

volumes:
  pgdata:
    name: ${SHADOWOB_POSTGRES_VOLUME:-shadow_pgdata}
  redisdata:
    name: ${SHADOWOB_REDIS_VOLUME:-shadow_redisdata}
  miniodata:
    name: ${SHADOWOB_MINIO_VOLUME:-shadow_miniodata}
