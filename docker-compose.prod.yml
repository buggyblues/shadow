# Production docker-compose for public deployment.
#
# Runtime hosts should pull CI-built application images instead of building
# from source. The app image defaults match .github/workflows/publish-prod-images.yml.
#
# Usage:
#   docker compose -f docker-compose.prod.yml pull server web
#   docker compose -f docker-compose.prod.yml up -d
#
# ⚠️  All sensitive values MUST be provided via a .env file.
#     See .env.example for required variables.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-shadow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-shadow}']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    image: ${SHADOW_IMAGE_REGISTRY:-ghcr.io}/${SHADOW_IMAGE_NAMESPACE:-buggyblues}/shadow-server:${SHADOW_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-shadow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shadow}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3002
      HOST: 0.0.0.0
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-shadow}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@shadowob.app}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      OAUTH_BASE_URL: ${OAUTH_BASE_URL:?OAUTH_BASE_URL is required}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SHADOW_MODEL_PROXY_ENABLED: ${SHADOW_MODEL_PROXY_ENABLED:-true}
      SHADOW_MODEL_PROXY_MODEL: ${SHADOW_MODEL_PROXY_MODEL:-deepseek-v4-flash}
      SHADOW_MODEL_PROXY_UPSTREAM_BASE_URL: ${SHADOW_MODEL_PROXY_UPSTREAM_BASE_URL:-https://api.deepseek.com}
      SHADOW_MODEL_PROXY_UPSTREAM_API_KEY: ${SHADOW_MODEL_PROXY_UPSTREAM_API_KEY:-}
      SHADOW_MODEL_PROXY_SHRIMP_PER_CNY: ${SHADOW_MODEL_PROXY_SHRIMP_PER_CNY:-20}
      SHADOW_MODEL_PROXY_INPUT_CACHE_HIT_CNY_PER_MILLION: ${SHADOW_MODEL_PROXY_INPUT_CACHE_HIT_CNY_PER_MILLION:-0.02}
      SHADOW_MODEL_PROXY_INPUT_CACHE_MISS_CNY_PER_MILLION: ${SHADOW_MODEL_PROXY_INPUT_CACHE_MISS_CNY_PER_MILLION:-1}
      SHADOW_MODEL_PROXY_OUTPUT_CNY_PER_MILLION: ${SHADOW_MODEL_PROXY_OUTPUT_CNY_PER_MILLION:-2}
      SHADOW_MODEL_PROXY_BILLING_MODE: ${SHADOW_MODEL_PROXY_BILLING_MODE:-}
      SHADOW_MODEL_PROXY_TOKENS_PER_SHRIMP: ${SHADOW_MODEL_PROXY_TOKENS_PER_SHRIMP:-}
      SHADOW_MODEL_PROXY_INPUT_TOKENS_PER_SHRIMP: ${SHADOW_MODEL_PROXY_INPUT_TOKENS_PER_SHRIMP:-}
      SHADOW_MODEL_PROXY_OUTPUT_TOKENS_PER_SHRIMP: ${SHADOW_MODEL_PROXY_OUTPUT_TOKENS_PER_SHRIMP:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    image: ${SHADOW_IMAGE_REGISTRY:-ghcr.io}/${SHADOW_IMAGE_NAMESPACE:-buggyblues}/shadow-web:${SHADOW_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - server

volumes:
  pgdata:
  redisdata:
  miniodata:
