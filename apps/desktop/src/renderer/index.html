<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' app: shadow-reader: 'unsafe-inline' 'unsafe-eval'; connect-src 'self' app: shadow-reader: http://localhost:* ws://localhost:* wss://*.shadowob.com wss://shadowob.com https://*.shadowob.com https://shadowob.com; img-src 'self' app: shadow-reader: data: blob: http://localhost:* https://*; media-src 'self' app: shadow-reader: data: blob: https:; frame-src 'self' app: shadow-reader: https:; font-src 'self' app: https://fonts.gstatic.com https://fonts.googleapis.com; style-src 'self' app: 'unsafe-inline' https://fonts.googleapis.com;" />
    <title>Shadow</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
    <script>
      // Apply saved theme before first paint to prevent flash
      (()=> {
        var t = localStorage.getItem('shadow-theme') || 'dark';
        var e = t === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : t;
        document.documentElement.className = e;
      })();
    </script>
  </head>
  <body class="bg-black text-text-primary" style="background: #000">
    <div id="root"></div>
  </body>
</html>
