# WebSocket connection upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── App Proxy: app-<uuid>.shadowob.com → backend proxy handler ──
# Named capture $app_id is extracted from server_name regex, no if blocks needed.
# rewrite+break rewrites the URI; proxy_pass has no variables so DNS resolves at startup.
server {
    listen 3000;
    server_name ~^app-(?<app_id>[0-9a-fA-F-]+)\.shadowob\.com$;

    client_max_body_size 50m;

    location / {
        rewrite ^(.*)$ /api/app-proxy/$app_id$1 break;
        proxy_pass http://server:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Debug headers (remove after debugging)
        add_header X-Debug-Server "app-proxy" always;
        add_header X-Debug-Host $host always;
        add_header X-Debug-AppId $app_id always;

        # SSE & streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }
}

# ── Main Web App ──
server {
    listen 3000 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Prevent nginx from appending :3000 to redirects (behind reverse proxy)
    absolute_redirect off;
    port_in_redirect off;

    client_max_body_size 50m;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Web app SPA — mounted under /app
    # Exact match: serve SPA directly without any redirect (avoids :3000 port leak)
    location = /app {
        try_files /app/index.html =404;
    }
    location ^~ /app/ {
        try_files $uri $uri/ /app/index.html;
    }

    # Docs static assets — long-lived cache
    location ^~ /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Docs site (Rspress) — root
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass http://server:3002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # MinIO media proxy — serve uploaded files (images, gifs, etc.)
    location ^~ /shadow/ {
        proxy_pass http://minio:9000/shadow/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header Content-Disposition;
    }

    # WebSocket proxy
    location /socket.io/ {
        proxy_pass http://server:3002/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Static assets cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
