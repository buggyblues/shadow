# ============================================================================
# Flash All-in-One — Docker Compose
#
# Usage (from monorepo root or apps/flash/docker/):
#   docker compose -f apps/flash/docker/docker-compose.yml up --build
#
# Then open:
#   http://localhost:8080
#
# Data is stored in apps/flash/data/ and apps/flash/output/
# ============================================================================

services:
  flash:
    build:
      context: ../../..
      dockerfile: apps/flash/docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - OPENCLAW_LLM_PROVIDER=deepseek
      - OPENCLAW_LLM_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENCLAW_LLM_BASE_URL=https://api.deepseek.com
      - OPENCLAW_LLM_MODEL=deepseek-chat
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-flash-token}
      - OPENCLAW_GATEWAY_PORT=3100
      - APP_PORT=8080
    volumes:
      - ../data:/data
      - ../output:/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
