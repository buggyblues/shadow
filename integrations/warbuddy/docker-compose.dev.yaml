name: shadow-integrations-dev

services:
  warbuddy:
    build:
      context: ${WARBUDDY_DEV_APP_DIR:-.}/../..
      dockerfile: integrations/warbuddy/Dockerfile
    command: pnpm dev:hot:install
    environment:
      PORT: '4218'
      SHADOW_SERVER_URL: ${SHADOW_SERVER_URL:-http://host.docker.internal:3002}
      SHADOW_APP_PUBLIC_BASE_URL: ${WARBUDDY_PUBLIC_BASE_URL:-http://localhost:4218}
      SHADOW_APP_API_BASE_URL: ${WARBUDDY_API_BASE_URL:-http://host.lima.internal:4218}
      WARBUDDY_DATA_FILE: /data/warbuddy.json
      WARBUDDY_VITE_DEV_SERVER_URL: ${WARBUDDY_VITE_DEV_SERVER_URL:-http://localhost:5178}
      WARBUDDY_VITE_PORT: ${WARBUDDY_VITE_PORT:-5178}
    ports:
      - ${WARBUDDY_PORT:-4218}:4218
      - ${WARBUDDY_VITE_PORT:-5178}:5178
    volumes:
      - ${WARBUDDY_DEV_APP_DIR:-.}:/repo/integrations/warbuddy
      - warbuddy-data:/data

volumes:
  warbuddy-data:
